<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objeto Encontrado — SafeTag</title>
  <meta name="description" content="Encontraste un objeto con un chip SafeTag. Contacta al dueño fácilmente." />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .tag-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }
    .tag-public-card {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    /* Found animation */
    .found-icon-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 16px;
    }
    .found-pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 212, 170, 0.15);
      animation: found-pulse 2s ease-in-out infinite;
    }
    .found-pulse:nth-child(2) { animation-delay: 0.5s; transform: scale(1.2); background: rgba(0, 212, 170, 0.08); }
    .found-icon-core {
      position: absolute;
      inset: 15px;
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.25), rgba(108, 99, 255, 0.2));
      border: 1px solid rgba(0, 212, 170, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      backdrop-filter: blur(10px);
    }
    @keyframes found-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 0.4; }
    }
    .found-label {
      display: inline-block;
      background: rgba(0, 212, 170, 0.12);
      border: 1px solid rgba(0, 212, 170, 0.3);
      color: var(--green);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .found-title {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .found-object {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .found-message {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 16px 0;
      font-style: italic;
    }
    .contact-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .contact-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 6px;
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      text-decoration: none;
      color: white;
      text-align: center;
      line-height: 1.2;
    }
    .contact-btn-whatsapp {
      background: linear-gradient(135deg, #25D366, #128C7E);
      box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
    }
    .contact-btn-whatsapp:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.45);
      color: white;
    }
    .contact-btn-email {
      background: linear-gradient(135deg, #6c63ff, #4a43cc);
      box-shadow: 0 4px 24px rgba(108, 99, 255, 0.3);
    }
    .contact-btn-email:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.45);
      color: white;
    }
    .contact-btn-location {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      box-shadow: 0 4px 24px rgba(245, 158, 11, 0.3);
    }
    .contact-btn-location:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.45);
      color: white;
    }
    .contact-btn-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }
    .contact-note {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 16px;
    }
    .safetag-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .safetag-footer a { color: var(--accent-light); font-weight: 500; }
    
    /* Responsive Adaptations */
    @media (max-width: 400px) {
      .tag-page { padding: 16px 12px; }
      .contact-buttons { gap: 6px; }
      .contact-btn { padding: 12px 4px; font-size: 0.7rem; }
      .contact-btn-icon { font-size: 1.4rem; }
      .found-icon-wrap { width: 80px; height: 80px; }
      .found-title { font-size: 1.4rem; }
    }
    
    @media (min-width: 600px) {
      .tag-page { padding: 60px 24px; }
      .tag-public-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 32px;
        padding: 40px 32px;
        box-shadow: 0 24px 48px -12px rgba(79, 70, 229, 0.15);
      }
    }

    /* Loading state */
    .loading-state { text-align: center; padding: 80px 24px; }
    /* Error state */
    .error-state { text-align: center; padding: 60px 24px; }
    .error-icon { font-size: 4rem; margin-bottom: 20px; }
    .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .error-desc { color: var(--text-secondary); font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="tag-page">
    <div class="tag-public-card" id="tag-content">
      <div class="loading-state">
        <div class="spinner" style="margin: 0 auto 20px; width: 36px; height: 36px; border-width: 3px;"></div>
        <p style="color: var(--text-secondary)">Buscando información del objeto...</p>
      </div>
    </div>
  </div>

  <script>
    // Extraer el ID del tag de la URL
    // La URL es /tag/XXXX pero el frontend sirve /tag.html y el backend maneja /tag/:id
    // Aquí manejamos la carga a través del backend
    const pathParts = window.location.pathname.split('/');
    const tagId = pathParts[pathParts.length - 1] || '';

    const container = document.getElementById('tag-content');

    async function loadTagData() {
      if (!tagId) {
        showError('ID de tag inválido', 'No se encontró un ID de tag en la URL.');
        return;
      }

      try {
        const res = await fetch(`/api/tag/${tagId}`);
        const data = await res.json();

        if (!res.ok) {
          showError('Tag no disponible', data.error || 'Este tag no existe o fue desactivado.');
          return;
        }

        renderTag(data);
      } catch (err) {
        showError('Error de conexión', 'No se pudo conectar al servidor. Verifica tu conexión a internet.');
      }
    }

    function renderTag(data) {
      window.tagData = data; // Guardamos para la geolocalización
      const esMascota = data.tipo === 'mascota';
      document.title = esMascota
        ? `🐾 Mascota encontrada: ${data.nombre_tag} — SafeTag`
        : `Objeto encontrado: ${data.nombre_tag} — SafeTag`;

      // Bloque de info de mascota
      let petBlock = '';
      if (esMascota && data.mascota) {
        const m = data.mascota;
        const infoItems = [
          m.especie           ? { label: 'Especie',  value: m.especie }           : null,
          m.raza              ? { label: 'Raza',     value: m.raza }              : null,
          m.color_descripcion ? { label: 'Color',    value: m.color_descripcion } : null,
          m.edad              ? { label: 'Edad',     value: m.edad }              : null,
        ].filter(Boolean);

        const infoGrid = infoItems.length > 0 ? `
          <div class="pet-info-grid">
            ${infoItems.map(i => `
              <div class="pet-info-item">
                <div class="pet-info-label">${escapeHtml(i.label)}</div>
                <div class="pet-info-value">${escapeHtml(i.value)}</div>
              </div>
            `).join('')}
          </div>
        ` : '';

        const medicaBlock = m.info_medica ? `
          <div class="pet-medica-box">
            ⚕️ <strong>Info médica:</strong> ${escapeHtml(m.info_medica)}
          </div>
        ` : '';

        petBlock = infoGrid + medicaBlock;
      }

      // Manejo del icono o foto principal
      const iconCore = (esMascota && data.imagen_mascota)
        ? `<img src="${data.imagen_mascota}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Mascota" />`
        : (esMascota ? '🐾' : '🎒');

      const coreStyle = (esMascota && data.imagen_mascota) ? 'padding:0; overflow:hidden;' : '';

      container.innerHTML = `
        <div class="found-icon-wrap">
          <div class="found-pulse"></div>
          <div class="found-pulse"></div>
          <div class="found-icon-core" style="${coreStyle}">${iconCore}</div>
        </div>

        <div class="found-label">${esMascota ? '🐾 Mascota Encontrada' : '📍 Objeto Encontrado'}</div>
        <h1 class="found-title">
          ${esMascota
            ? `Hola, encontraste<br/>a <strong>${escapeHtml(data.nombre_tag)}</strong>`
            : `Hola, encontraste<br/>algo de ${escapeHtml(data.nombre_dueno)}`
          }
        </h1>
        <p class="found-object">
          ${esMascota ? `👤 Dueño: ${escapeHtml(data.nombre_dueno)}` : `🏷️ ${escapeHtml(data.nombre_tag)}`}
        </p>

        ${petBlock}

        <div class="found-message">
          "  ${escapeHtml(data.mensaje)}  "
        </div>

        <div class="contact-buttons">
          <a
            class="contact-btn contact-btn-whatsapp"
            href="${data.contacto.whatsapp}"
            target="_blank"
            rel="noopener noreferrer"
            id="btn-whatsapp"
          >
            <span class="contact-btn-icon">💬</span>
            WhatsApp
          </a>
          <button
            class="contact-btn contact-btn-location"
            onclick="shareLocation()"
            id="btn-location"
          >
            <span class="contact-btn-icon">📍</span>
            Ubicación
          </button>
          <a
            class="contact-btn contact-btn-email"
            href="${data.contacto.email}"
            id="btn-email"
          >
            <span class="contact-btn-icon">✉️</span>
            Correo
          </a>
        </div>

        <p class="contact-note">
          🔒 Tu privacidad está protegida — el número de teléfono y correo del dueño no se muestran directamente
        </p>

        <div class="safetag-footer">
          Powered by <a href="/">SafeTag</a> · Tecnología NFC para equipaje y mascotas
        </div>
      `;
    }

    function shareLocation() {
      if (!window.tagData || !window.tagData.telefono_raw) {
        alert('No hay información de contacto disponible.');
        return;
      }
      
      const btn = document.getElementById('btn-location');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="contact-btn-icon">⏳</span> Espere...';
      btn.style.pointerEvents = 'none';

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            btn.innerHTML = originalText;
            btn.style.pointerEvents = 'auto';

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const baseText = window.tagData.whatsapp_text_base || '¡Hola! Encontré tu tag.';
            const finalMsg = `${baseText} ¡Aquí está mi ubicación actual donde lo encontré!: ${mapsLink}`;
            
            window.location.href = `https://wa.me/${window.tagData.telefono_raw}?text=${encodeURIComponent(finalMsg)}`;
          },
          (error) => {
            btn.innerHTML = originalText;
            btn.style.pointerEvents = 'auto';
            alert("⚠️ No pudimos obtener tu ubicación. Por favor, asegúrate de haber dado los permisos de GPS al navegador.");
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      } else {
        btn.innerHTML = originalText;
        btn.style.pointerEvents = 'auto';
        alert("Tu navegador o dispositivo no soporta geolocalización.");
      }
    }

    function showError(title, desc) {
      container.innerHTML = `
        <div class="error-state">
          <div class="error-icon">🔍</div>
          <h2 class="error-title">${escapeHtml(title)}</h2>
          <p class="error-desc">${escapeHtml(desc)}</p>
          <br/>
          <a href="/" class="btn btn-secondary" style="display:inline-flex; margin-top: 20px;">Ir al inicio</a>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }

    loadTagData();
  </script>
</body>
</html>
