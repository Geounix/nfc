<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — Cerca</title>
  <meta name="description" content="Establece tu nueva contraseña para Cerca." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { width: 100%; max-width: 460px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 44px; backdrop-filter: blur(20px); }
    .auth-logo { display: flex; align-items: center; gap: 12px; font-size: 1.3rem; font-weight: 800; margin-bottom: 36px; color: var(--text-primary); text-decoration: none; }
    .logo-img { height: 36px; width: auto; object-fit: contain; }
    .auth-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-light); font-weight: 500; }
    .divider { border: none; border-top: 1px solid var(--glass-border); margin: 24px 0; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="img/logo.png" alt="Cerca Logo" class="logo-img" />
        Cerca
      </a>
      <h1 class="auth-title">Nueva contraseña</h1>
      <p class="auth-subtitle">Por favor, ingresa tu nueva contraseña segura.</p>

      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span> <span id="alert-error-msg"></span>
      </div>
      <div class="alert alert-success" id="alert-success">
        <span>✅</span> <span id="alert-success-msg"></span>
      </div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">Nueva contraseña</label>
          <input class="form-input" type="password" id="password" placeholder="Mínimo 6 caracteres" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="Repite la contraseña" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-submit">Guardar y acceder</button>
      </form>
    </div>
  </div>

  <script>
    // Extraer token de la URL -> ?token=xyz
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const form = document.getElementById('reset-form');
    const btnSubmit = document.getElementById('btn-submit');
    const alertError = document.getElementById('alert-error');
    const alertErrorMsg = document.getElementById('alert-error-msg');
    const alertSuccess = document.getElementById('alert-success');
    const alertSuccessMsg = document.getElementById('alert-success-msg');

    function showError(msg) { alertError.classList.add('show'); alertErrorMsg.textContent = msg; alertSuccess.classList.remove('show'); }
    function showSuccess(msg) { alertSuccess.classList.add('show'); alertSuccessMsg.textContent = msg; alertError.classList.remove('show'); }

    if (!token) {
      showError('No se encontró un token válido en la URL.');
      document.getElementById('password').disabled = true;
      document.getElementById('confirm-password').disabled = true;
      btnSubmit.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) return;

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password.length < 6) return showError('La contraseña debe tener al menos 6 caracteres.');
      if (password !== confirmPassword) return showError('Las contraseñas no coinciden.');

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<div class="spinner"></div> Guardando...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Error al restablecer la contraseña.');
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Guardar y acceder';
          return;
        }
        showSuccess(data.message);
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch {
        showError('Error de conexión con el servidor.');
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Guardar y acceder';
      }
    });
  </script>
</body>
</html>
