<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Cerca</title>
  <meta name="description" content="Inicia sesión en tu cuenta Cerca para gestionar tus chips NFC." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 44px;
      backdrop-filter: blur(20px);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 36px;
      color: var(--text-primary);
    }
    .auth-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .auth-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-light); font-weight: 500; }
    .divider { border: none; border-top: 1px solid var(--glass-border); margin: 24px 0; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo" style="gap: 12px;">
        <img src="img/logo.png" alt="Cerca Logo" class="logo-img" />
        Cerca
      </a>

      <h1 class="auth-title">Bienvenido de vuelta</h1>
      <p class="auth-subtitle">Ingresa a tu cuenta para gestionar tus tags NFC</p>

      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-msg"></span>
      </div>
      <div class="alert alert-success" id="alert-success">
        <span>✅</span>
        <span id="alert-success-msg"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="tu@correo.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          Iniciar sesión
        </button>
      </form>

      <hr class="divider" />
      <div class="auth-footer">
        ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('safetag_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const alertError = document.getElementById('alert-error');
    const alertErrorMsg = document.getElementById('alert-error-msg');
    const alertSuccess = document.getElementById('alert-success');
    const alertSuccessMsg = document.getElementById('alert-success-msg');

    function showError(msg) {
      alertError.classList.add('show');
      alertErrorMsg.textContent = msg;
      alertSuccess.classList.remove('show');
    }
    function showSuccess(msg) {
      alertSuccess.classList.add('show');
      alertSuccessMsg.textContent = msg;
      alertError.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) return showError('Por favor completa todos los campos.');

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<div class="spinner"></div> Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Error al iniciar sesión.');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Iniciar sesión';
          return;
        }

        localStorage.setItem('safetag_token', data.token);
        localStorage.setItem('safetag_user', JSON.stringify(data.user));
        showSuccess('¡Bienvenido! Redirigiendo...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch {
        showError('Error de conexión. Verifica que el servidor esté activo.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
