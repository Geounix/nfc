<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — SafeTag</title>
  <meta name="description" content="Crea tu cuenta SafeTag gratuita y empieza a proteger tu equipaje con tecnología NFC." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 44px;
      backdrop-filter: blur(20px);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 36px;
      color: var(--text-primary);
    }
    .auth-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .auth-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-light); font-weight: 500; }
    .divider { border: none; border-top: 1px solid var(--glass-border); margin: 24px 0; }
    .password-strength {
      height: 4px;
      border-radius: 2px;
      background: var(--glass-border);
      margin-top: 8px;
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: all 0.4s ease;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="auth-logo-icon">🏷️</div>
        SafeTag
      </a>

      <h1 class="auth-title">Crea tu cuenta</h1>
      <p class="auth-subtitle">Empieza a proteger tu equipaje con chips NFC inteligentes</p>

      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-msg"></span>
      </div>
      <div class="alert alert-success" id="alert-success">
        <span>✅</span>
        <span id="alert-success-msg"></span>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre completo</label>
          <input
            class="form-input"
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Juan García"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="tu@correo.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            required
          />
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
          <div class="form-hint" id="strength-hint">Ingresa tu contraseña</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input
            class="form-input"
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-register">
          Crear cuenta gratis
        </button>
      </form>

      <hr class="divider" />
      <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('safetag_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('register-form');
    const btnRegister = document.getElementById('btn-register');
    const alertError = document.getElementById('alert-error');
    const alertErrorMsg = document.getElementById('alert-error-msg');
    const alertSuccess = document.getElementById('alert-success');
    const alertSuccessMsg = document.getElementById('alert-success-msg');
    const strengthBar = document.getElementById('strength-bar');
    const strengthHint = document.getElementById('strength-hint');

    function showError(msg) {
      alertError.classList.add('show');
      alertErrorMsg.textContent = msg;
      alertSuccess.classList.remove('show');
    }
    function showSuccess(msg) {
      alertSuccess.classList.add('show');
      alertSuccessMsg.textContent = msg;
      alertError.classList.remove('show');
    }

    // Password strength
    document.getElementById('password').addEventListener('input', (e) => {
      const val = e.target.value;
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ['', '#ff5a5a', '#ffc94d', '#ffc94d', '#00d4aa', '#00d4aa'];
      const hints = ['', 'Muy débil', 'Débil', 'Regular', 'Fuerte', 'Muy fuerte'];
      strengthBar.style.width = `${strength * 20}%`;
      strengthBar.style.background = colors[strength];
      strengthHint.textContent = val.length === 0 ? 'Ingresa tu contraseña' : hints[strength];
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!nombre || !email || !password) return showError('Por favor completa todos los campos.');
      if (password.length < 6) return showError('La contraseña debe tener al menos 6 caracteres.');
      if (password !== confirmPassword) return showError('Las contraseñas no coinciden.');

      btnRegister.disabled = true;
      btnRegister.innerHTML = '<div class="spinner"></div> Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Error al registrarse.');
          btnRegister.disabled = false;
          btnRegister.textContent = 'Crear cuenta gratis';
          return;
        }

        localStorage.setItem('safetag_token', data.token);
        localStorage.setItem('safetag_user', JSON.stringify(data.user));
        showSuccess('¡Cuenta creada! Redirigiendo a tu panel...');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch {
        showError('Error de conexión. Verifica que el servidor esté activo.');
        btnRegister.disabled = false;
        btnRegister.textContent = 'Crear cuenta gratis';
      }
    });
  </script>
</body>
</html>
